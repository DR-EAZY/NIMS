{% extends "base.html" %}

{% block content %}

<h2>Edit Account</h2>

<form method="POST">
    <input type="text" name="service" value="{{ account.service }}" required><br><br>

    <input type="text" name="username" value="{{ account.username }}" required><br><br>

    <input type="text" name="password" value="{{ account.password }}" required><br><br>

    <button type="submit">Update</button>
</form>

{% endblock %}
