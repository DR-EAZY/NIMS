{% extends "base.html" %}

{% block content %}

<h1>Account Management</h1>

<a href="/add-account"><button>Add Account</button></a>

<table>
    <tr>
        <th>Service</th>
        <th>Username</th>
        <th>Password</th>
        <th>Action</th>
    </tr>

    {% for acc in accounts %}
    <tr>
        <td>{{ acc.service }}</td>
        <td>{{ acc.username }}</td>
        <td>{{ acc.password }}</td>
        <td>
            <a href="/delete-account/{{ acc.id }}" 
            class="edit-btn" style="color: red;"
             onclick="return confirm('Are you sure you want to delete this account?');"
            >
    Delete
</a>
            <a href="/edit-account/{{ acc.id }}" class="edit-btn">Edit</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
