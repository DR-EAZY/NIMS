{% extends "base.html" %}

{% block content %}

<h2>Add IP Address</h2>
<p>Enter a new IP and assign it to a device</p>

<form method="POST">
    <input type="text" name="ip_address" placeholder="IP Address (e.g. 192.168.1.10)" required><br><br>

    <input type="text" name="device_name" placeholder="Device Name (optional)"><br><br>

    <select name="status">
        <option>Used</option>
        <option>Free</option>
    </select><br><br>

    <button type="submit">Save</button>
</form>

{% endblock %}
