{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card settings-card">
        <h1 class="title">⚙️ Settings</h1>
        <p class="subtitle">Manage your system configuration</p>

        <form method="POST" class="settings-form">

            <!-- System Name -->
            <div class="form-group">
                <label>System Name</label>
                <input type="text" name="system_name"
                       value="{{ settings.system_name }}" required>
            </div>

            <!-- Admin Email -->
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" name="admin_email"
                       value="{{ settings.admin_email }}" required>
            </div>

            <!-- Theme -->
            <div class="form-group">
                <label>Theme</label>
                <select name="theme">
                    <option {% if settings.theme == "Light Mode" %}selected{% endif %}>Light Mode</option>
                    <option {% if settings.theme == "Dark Mode" %}selected{% endif %}>Dark Mode</option>
                </select>
            </div>

            <!-- Notifications -->
            <div class="form-group toggle">
                <label>Enable Notifications</label>
                <input type="checkbox" name="notifications"
                       {% if settings.notifications %}checked{% endif %}>
            </div>

            <!-- Buttons -->
            <div class="actions">
                <button type="submit" class="btn primary">Save Changes</button>
                <button type="reset" class="btn secondary">Reset</button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
